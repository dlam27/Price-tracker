name: Daily price check

on:
  schedule:
    # 20:00 UTC = 6am AEST / 7am AEDT
    - cron: '0 20 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price check
        run: python scrape.py
        continue-on-error: true   # still commit whatever prices we did get

      - name: Commit updated history
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "Price check $(date -u +%F)"
          git push
