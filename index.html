<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Price Tracker</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --coles-red: #e2231a;
    --woolies-green: #078943;
    --bg: #0f1115;
    --card: #1a1d24;
    --text: #eee;
    --muted: #9aa0a6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    padding-bottom: 40px;
  }
  h1 { font-size: 1.4rem; margin: 0 0 4px; }
  .updated { color: var(--muted); font-size: 0.8rem; margin-bottom: 16px; }
  .grid { display: grid; gap: 12px; }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .card h2 { margin: 0 0 8px; font-size: 1rem; font-weight: 600; }
  .prices { display: flex; gap: 20px; margin-bottom: 6px; }
  .price-tag .store {
    color: var(--muted);
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .price-tag .amount { font-size: 1.3rem; font-weight: 700; }
  .coles .amount { color: var(--coles-red); }
  .woolworths .amount { color: var(--woolies-green); }
  canvas { margin-top: 4px; max-height: 130px; width: 100% !important; }
  .empty { color: var(--muted); font-size: 0.85rem; }
  .error {
    color: var(--muted);
    text-align: center;
    margin-top: 40px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<h1>🛒 Price Tracker</h1>
<div class="updated" id="updated">Loading…</div>
<div class="grid" id="items"></div>

<script>
async function main() {
  let history;
  try {
    const res = await fetch('history.json?_=' + Date.now());
    if (!res.ok) throw new Error('history.json not found yet');
    history = await res.json();
  } catch (e) {
    document.getElementById('updated').textContent = '';
    document.getElementById('items').innerHTML =
      '<div class="error">No data yet — history.json will appear after the first ' +
      'scheduled (or manually triggered) run of the GitHub Action.</div>';
    return;
  }

  const container = document.getElementById('items');
  let latestTimestamp = null;

  Object.entries(history).forEach(([id, item]) => {
    const byStore = { coles: [], woolworths: [] };
    (item.snapshots || []).forEach(s => {
      if (byStore[s.store]) byStore[s.store].push(s);
      if (!latestTimestamp || s.timestamp > latestTimestamp) latestTimestamp = s.timestamp;
    });

    const card = document.createElement('div');
    card.className = 'card';

    const latestPricesHtml = Object.entries(byStore).map(([store, snaps]) => {
      if (!snaps.length) return '';
      const last = snaps[snaps.length - 1];
      const amount = typeof last.price === 'number' ? `$${last.price.toFixed(2)}` : '?';
      return `<div class="price-tag ${store}">
        <span class="store">${store}</span>
        <span class="amount">${amount}</span>
      </div>`;
    }).join('');

    const chartId = `chart-${id}`;
    card.innerHTML = `
      <h2>${item.name}</h2>
      <div class="prices">${latestPricesHtml || '<span class="empty">No data yet</span>'}</div>
      <canvas id="${chartId}"></canvas>
    `;
    container.appendChild(card);

    const hasHistory = (byStore.coles.length + byStore.woolworths.length) > 1;
    if (hasHistory) {
      const longest = byStore.coles.length >= byStore.woolworths.length ? byStore.coles : byStore.woolworths;
      const labels = longest.map(s =>
        new Date(s.timestamp).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })
      );
      const datasets = Object.entries(byStore)
        .filter(([, snaps]) => snaps.length > 0)
        .map(([store, snaps]) => ({
          label: store,
          data: snaps.map(s => s.price),
          borderColor: store === 'coles' ? '#e2231a' : '#078943',
          backgroundColor: 'transparent',
          tension: 0.25,
          pointRadius: 2,
        }));

      new Chart(document.getElementById(chartId).getContext('2d'), {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#9aa0a6', maxRotation: 0 }, grid: { color: '#2a2d35' } },
            y: { ticks: { color: '#9aa0a6' }, grid: { color: '#2a2d35' } },
          },
        },
      });
    }
  });

  document.getElementById('updated').textContent = latestTimestamp
    ? `Last updated: ${new Date(latestTimestamp).toLocaleString('en-AU')}`
    : 'Waiting for the first price check…';
}

main();
</script>
</body>
</html>
